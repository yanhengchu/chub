<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>{{ app_name }} 管理面板</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">PERSONAL DEVICE HUB</p>
        <h1>{{ app_name }}</h1>
      </div>
      <span class="version">v{{ app_version }}</span>
    </header>

    <main>
      <section id="connected-bar" class="card connected-bar" hidden aria-label="当前连接">
        <div class="connected-top">
          <div>
            <p class="section-kicker">当前节点</p>
            <div class="connected-identity">
              <h2 id="connected-node">Hub Node</h2>
              <span id="connection-badge" class="badge badge-success">已连接</span>
            </div>
            <p id="connected-meta" class="connected-meta"></p>
            <p id="connected-summary" class="connected-summary"></p>
          </div>
          <button id="refresh-status" class="button-secondary" type="button">刷新</button>
        </div>
      </section>

      <section id="access-card" class="card access-card" aria-labelledby="access-title">
        <div class="section-heading">
          <div>
            <p class="section-kicker">访问凭证</p>
            <h2 id="access-title">连接此节点</h2>
          </div>
          <span id="access-badge" class="badge badge-muted">未连接</span>
        </div>
        <form id="token-form">
          <label for="token-input">Hub Token</label>
          <div class="token-row">
            <input
              id="token-input"
              name="token"
              type="password"
              autocomplete="off"
              spellcheck="false"
              placeholder="输入 HUB_TOKEN"
              required
            >
            <button id="connect-submit" type="submit">连接节点</button>
          </div>
          <div class="access-actions">
            <label class="remember-option">
              <input id="remember-token" type="checkbox">
              在此设备记住 Token
            </label>
          </div>
        </form>
        <p class="hint">默认仅保存在当前浏览器会话。请只在可信设备上选择记住。</p>
        <p id="global-message" class="message" role="status" aria-live="polite">
          输入启动 Hub 时配置的 Token。
        </p>
      </section>

      <div id="dashboard" class="dashboard" hidden>
        <section class="card tasks-card" aria-labelledby="tasks-title">
          <div class="section-heading">
            <div>
              <p class="section-kicker">节点任务</p>
              <h2 id="tasks-title">可用任务</h2>
            </div>
          </div>
          <p class="section-description">任务独立成卡，结果在卡片底部显示。</p>
          <div id="task-list" class="task-list"></div>
          <p id="tasks-message" class="message" aria-live="polite"></p>
        </section>

        <section class="card maintenance-card" aria-labelledby="maintenance-title">
          <div class="section-heading">
            <div>
              <p class="section-kicker">节点维护</p>
              <h2 id="maintenance-title">次级操作</h2>
            </div>
          </div>
          <p class="section-description">不常用操作集中在这里。</p>
          <div class="maintenance-actions">
            <button id="restart-hub" class="button-secondary" type="button">重启</button>
            <button id="clear-token" class="button-danger" type="button">退出</button>
          </div>
          <div class="maintenance-logs">
            <div class="section-heading">
              <div>
                <p class="section-kicker">诊断信息</p>
                <h2 id="logs-title">近期日志</h2>
              </div>
              <button id="load-logs" class="button-secondary" type="button">读取日志</button>
            </div>
            <p id="logs-message" class="message">按需读取最近 50 行。</p>
            <pre id="logs-output" class="logs-output" hidden></pre>
          </div>
        </section>

      </div>
    </main>

    <footer>Hub 仅适合在可信网络中使用。</footer>
  </body>
</html>
