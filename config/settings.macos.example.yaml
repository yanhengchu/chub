app:
  name: "Hub"
  version: "0.1.0"
  page_title: "MacBook · Hub"

node:
  id: "macbook"
  name: "MacBook"
  type: "macos"

server:
  # Replace with this node's Tailscale IP to enable remote Codex PTY.
  host: "127.0.0.1"
  port: 8080

security: {}

tasks:
  default_timeout: 30

logs:
  file: "logs/hub.log"
  level: "INFO"
  max_lines: 100

codex_pty:
  enabled: true
  workspace: "~/workspace"
  data_file: "data/codex-sessions.json"
  ticket_ttl_seconds: 600
  max_running: 3

automations:
  enabled: true
  config_file: "config/automations.local.yaml"
  data_dir: "data/automations"
  max_home_tasks: 3
